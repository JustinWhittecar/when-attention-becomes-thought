[book]
authors = ["Justin Dielmann"]
language = "en"
multilingual = false
src = "src"
title = "When Attention Becomes Thought"
description = "A literature review tracing the path from transformers to artificial general intelligence, 2017 to 2026."

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
no-section-label = false
# Update the two URLs below once the repo is pushed to GitHub.
git-repository-url = "https://github.com/JustinWhittecar/when-attention-becomes-thought"
edit-url-template = "https://github.com/JustinWhittecar/when-attention-becomes-thought/edit/main/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.print]
enable = true

[output.html.fold]
enable = false
level = 0
